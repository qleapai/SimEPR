<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <linearGradient id="bgBanner" x1="0" y1="0" x2="1" y2="0.8">
      <stop offset="0%"   stop-color="#080e2e"/>
      <stop offset="45%"  stop-color="#0f2060"/>
      <stop offset="100%" stop-color="#1a3a9c"/>
    </linearGradient>

    <filter id="glowBanner" x="-15%" y="-30%" width="130%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softBanner" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Fade mask so spectrum dissolves into left text area -->
    <linearGradient id="fadeLeft" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="black" stop-opacity="0"/>
      <stop offset="25%" stop-color="black" stop-opacity="1"/>
    </linearGradient>
    <mask id="spectrumMask">
      <rect width="1200" height="340" fill="url(#fadeLeft)"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bgBanner)"/>

  <!-- Subtle horizontal rule lines (graph paper feel) -->
  <g opacity="0.05">
    <line x1="0" y1="110" x2="1200" y2="110" stroke="white" stroke-width="1"/>
    <line x1="0" y1="170" x2="1200" y2="170" stroke="white" stroke-width="1"/>
    <line x1="0" y1="230" x2="1200" y2="230" stroke="white" stroke-width="1"/>
  </g>

  <!-- ── Spectrum region (right 55% of banner, faded in from left) ── -->
  <g mask="url(#spectrumMask)">

    <!-- Field axis -->
    <line x1="380" y1="170" x2="1170" y2="170"
          stroke="rgba(255,255,255,0.18)" stroke-width="1.5"
          stroke-dasharray="7,6" stroke-linecap="round"/>

    <!-- Broad background signal -->
    <path d="
      M 360,170
      C 480,170 580,152 680,162
      C 760,169 820,165 920,175
      C 1000,182 1090,170 1180,170
    "
    fill="none" stroke="#818cf8" stroke-width="2" opacity="0.25"
    stroke-linecap="round"/>

    <!-- Second EPR component -->
    <!--
      Centre x=830, σ≈105px, amplitude 52px.
      Positive peak at x=725, y=118; trough at x=935, y=222.
    -->
    <path d="
      M 400,170
      C 480,170  610,106 720,114
      C 762,117  795,158 830,170
      C 865,181  898,218 940,224
      C 980,229 1070,170 1170,170
    "
    fill="none" stroke="#60a5fa" stroke-width="2.8" opacity="0.68"
    stroke-linecap="round" filter="url(#softBanner)"/>

    <!-- Main EPR first-derivative curve (white) -->
    <!--
      Centre x=820, σ≈120px, amplitude 80px.
      Positive peak at x=700, y=90; trough at x=940, y=250.
    -->
    <path d="
      M 360,170
      C 440,170  580,90  700,90
      C 755,90   790,160 820,170
      C 850,179  885,250 940,250
      C 1000,250 1100,170 1180,170
    "
    fill="none" stroke="white" stroke-width="4.5"
    stroke-linecap="round" filter="url(#glowBanner)"/>

    <!-- Zero-crossing dot -->
    <circle cx="820" cy="170" r="6" fill="white" opacity="0.88"/>

    <!-- Axis label -->
    <text x="1175" y="162"
          text-anchor="end"
          fill="rgba(255,255,255,0.35)"
          font-family="'Helvetica Neue','Arial',sans-serif"
          font-size="15" font-style="italic">B₀ / mT</text>

    <!-- Component labels -->
    <text x="696" y="76"
          text-anchor="middle"
          fill="rgba(255,255,255,0.40)"
          font-family="'Helvetica Neue','Arial',sans-serif"
          font-size="12">Component 1</text>
    <text x="718" y="104"
          text-anchor="middle"
          fill="rgba(96,165,250,0.55)"
          font-family="'Helvetica Neue','Arial',sans-serif"
          font-size="11">Component 2</text>
  </g>

  <!-- ── Text / branding (left side) ── -->

  <!-- Large wordmark -->
  <text x="68" y="148"
        fill="white"
        font-family="'Helvetica Neue','Arial',sans-serif"
        font-size="102" font-weight="800" letter-spacing="3">SimEPR</text>

  <!-- Tagline line 1 -->
  <text x="70" y="192"
        fill="rgba(255,255,255,0.75)"
        font-family="'Helvetica Neue','Arial',sans-serif"
        font-size="21" font-weight="300" letter-spacing="0.5">Open-source cw-EPR simulation, fitting &amp; publication export</text>

  <!-- Feature pills -->
  <g font-family="'Helvetica Neue','Arial',sans-serif" font-size="13" font-weight="500">
    <!-- Pill backgrounds -->
    <rect x="70"  y="218" width="130" height="26" rx="13" fill="rgba(255,255,255,0.10)"/>
    <rect x="210" y="218" width="130" height="26" rx="13" fill="rgba(255,255,255,0.10)"/>
    <rect x="350" y="218" width="150" height="26" rx="13" fill="rgba(255,255,255,0.10)"/>
    <rect x="510" y="218" width="170" height="26" rx="13" fill="rgba(255,255,255,0.10)"/>

    <!-- Pill text -->
    <text x="135"  y="235" text-anchor="middle" fill="rgba(255,255,255,0.78)">⚛ Simulation</text>
    <text x="275"  y="235" text-anchor="middle" fill="rgba(255,255,255,0.78)">📐 Fitting</text>
    <text x="425"  y="235" text-anchor="middle" fill="rgba(255,255,255,0.78)">🔬 Intermediates</text>
    <text x="595"  y="235" text-anchor="middle" fill="rgba(255,255,255,0.78)">📄 Publication export</text>
  </g>

  <!-- Bottom credits bar -->
  <rect x="0" y="298" width="1200" height="42" fill="rgba(0,0,0,0.25)"/>
  <text x="70" y="324"
        fill="rgba(255,255,255,0.45)"
        font-family="'Helvetica Neue','Arial',sans-serif"
        font-size="13">MIT License · Python · Streamlit · Free to use</text>
  <text x="1130" y="324"
        text-anchor="end"
        fill="rgba(255,255,255,0.35)"
        font-family="'Helvetica Neue','Arial',sans-serif"
        font-size="13">github.com/SimEPR</text>
</svg>
